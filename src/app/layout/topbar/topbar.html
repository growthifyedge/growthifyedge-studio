<header
  class="sticky top-0 z-20 flex h-[68px] items-center gap-3 border-b border-white/50 bg-white/65 px-4 shadow-[0_4px_24px_-12px_rgba(24,16,64,0.18)] backdrop-blur-2xl sm:px-6 lg:px-10"
>
  <div class="pointer-events-none absolute inset-x-0 bottom-0 h-px bg-gradient-to-r from-transparent via-brand-400/40 to-transparent"></div>
  <!-- Mobile menu -->
  <button
    type="button"
    (click)="toggleMenu.emit()"
    class="grid h-10 w-10 place-items-center rounded-2xl text-slate-600 hover:bg-slate-100 lg:hidden"
    aria-label="Open navigation"
  >
    <ge-icon name="menu" />
  </button>

  <!-- Global search -->
  <div class="group relative w-full max-w-xl">
    <span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 transition group-focus-within:text-brand-500">
      <ge-icon name="search" [size]="18" />
    </span>
    <input
      type="search"
      [value]="searchTerm()"
      (input)="onSearch($any($event.target).value)"
      placeholder="Search software, AI tools, automations, tech stack…"
      class="ge-input !rounded-2xl border-slate-200/80 !bg-white/85 pl-11 shadow-soft"
      aria-label="Global search"
    />
    <kbd
      class="pointer-events-none absolute right-3 top-1/2 hidden -translate-y-1/2 rounded-md border border-slate-200 bg-slate-50 px-1.5 py-0.5 text-[10px] font-semibold text-slate-400 sm:block"
    >
      ⌘K
    </kbd>
  </div>

  <div class="ml-auto flex items-center gap-2">
    <button
      type="button"
      class="relative hidden h-10 w-10 place-items-center rounded-2xl text-slate-500 transition hover:bg-slate-100 sm:grid"
      aria-label="Notifications"
    >
      <ge-icon name="bell" [size]="19" />
      <span class="absolute right-2.5 top-2.5 h-2 w-2 rounded-full bg-flush-500 ring-2 ring-white"></span>
    </button>

    <button type="button" (click)="startPresentation()" class="ge-btn-aurora hidden !rounded-2xl !px-4 !py-2.5 sm:inline-flex">
      <ge-icon name="presentation" [size]="18" />
      <span>Present</span>
    </button>

    <!-- Account -->
    <div class="flex items-center gap-2 rounded-2xl border border-white/70 bg-white/80 px-2 py-1.5 shadow-soft backdrop-blur">
      <div class="grid h-9 w-9 place-items-center rounded-xl bg-aurora text-xs font-bold text-white shadow-glow">GE</div>
      <div class="hidden leading-tight pr-1 sm:block">
        <p class="text-xs font-semibold text-slate-800">GrowthifyEdge</p>
        <p class="text-[11px] text-slate-400">Client Demo</p>
      </div>
    </div>
  </div>
</header>
