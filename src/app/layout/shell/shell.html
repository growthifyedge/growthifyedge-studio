@if (presentation.active()) {
  <!-- Presentation mode: full-bleed, no chrome -->
  <div class="min-h-screen bg-ink-950">
    <router-outlet />
  </div>
} @else {
  <div class="relative min-h-screen bg-slate-100">
    <!-- Ambient light mesh on the canvas -->
    <div class="pointer-events-none fixed inset-0 bg-mesh-light"></div>

    <!-- Mobile backdrop -->
    @if (mobileOpen()) {
      <div
        class="fixed inset-0 z-30 bg-ink-950/50 backdrop-blur-sm lg:hidden"
        (click)="closeMobile()"
      ></div>
    }

    <!-- Sidebar -->
    <ge-sidebar
      [mobileOpen]="mobileOpen()"
      (navigate)="closeMobile()"
      class="fixed inset-y-0 left-0 z-40 w-[280px] -translate-x-full p-3 transition-transform duration-300 lg:translate-x-0"
      [class.translate-x-0]="mobileOpen()"
    />

    <!-- Main column -->
    <div class="relative flex min-h-screen flex-col lg:pl-[280px]">
      <ge-topbar (toggleMenu)="toggleMobile()" />

      <main class="flex-1 px-4 py-6 sm:px-6 lg:px-10 lg:py-9">
        <div class="mx-auto w-full max-w-7xl animate-fade-in">
          <router-outlet />
        </div>
      </main>

      <footer class="px-6 py-8 text-center text-xs text-slate-400 lg:px-10">
        © 2026 GrowthifyEdge · Software Showcase Hub — built with Angular 22, signals & Tailwind ·
        crafted for client presentations.
      </footer>
    </div>
  </div>
}
