<div class="ge-card-glass p-4 sm:p-5">
  <!-- Category pills -->
  <div class="flex flex-wrap items-center gap-2">
    @for (cat of categories; track cat) {
      <button
        type="button"
        (click)="setCategory(cat)"
        class="rounded-full px-3.5 py-1.5 text-xs font-semibold transition"
        [class]="
          filters.category === cat
            ? 'bg-aurora text-white shadow-glow'
            : 'border border-slate-200 bg-white/70 text-slate-600 hover:border-brand-300 hover:text-brand-700'
        "
      >
        {{ cat }}
      </button>
    }
  </div>

  <div class="mt-4 flex flex-col gap-3 border-t border-slate-200/70 pt-4 lg:flex-row lg:items-center">
    <label class="flex items-center gap-2 text-sm">
      <span class="font-medium text-slate-500">Status</span>
      <select class="ge-input !w-auto !py-2" [value]="filters.status" (change)="setStatus($any($event.target).value)">
        @for (s of statuses; track s) { <option [value]="s">{{ s }}</option> }
      </select>
    </label>

    <label class="flex items-center gap-2 text-sm">
      <span class="font-medium text-slate-500">Technology</span>
      <select class="ge-input !w-auto !py-2" [value]="filters.tech" (change)="setTech($any($event.target).value)">
        <option value="All">All</option>
        @for (t of techs(); track t) { <option [value]="t">{{ t }}</option> }
      </select>
    </label>

    <label class="flex items-center gap-2 text-sm">
      <span class="font-medium text-slate-500">Sort</span>
      <select class="ge-input !w-auto !py-2" [value]="filters.sort" (change)="setSort($any($event.target).value)">
        @for (s of sorts; track s.value) { <option [value]="s.value">{{ s.label }}</option> }
      </select>
    </label>

    <button
      type="button"
      (click)="toggleFeatured()"
      class="inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-semibold transition"
      [class]="
        filters.featuredOnly
          ? 'bg-brand-50 text-brand-700 ring-1 ring-brand-200'
          : 'border border-slate-200 bg-white/70 text-slate-600 hover:border-brand-300'
      "
    >
      <ge-icon name="sparkles" [size]="16" /> Featured
    </button>

    <button
      type="button"
      (click)="reset()"
      class="ml-auto inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-brand-600"
    >
      <ge-icon name="filter" [size]="15" /> Reset
    </button>
  </div>
</div>
