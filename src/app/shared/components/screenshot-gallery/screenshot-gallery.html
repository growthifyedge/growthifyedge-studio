@if (active(); as shot) {
  <div class="space-y-3">
    <!-- Main frame -->
    <div class="group relative overflow-hidden rounded-2xl border border-slate-200 bg-slate-100">
      @if (hasFailed(activeIndex())) {
        <div class="ge-thumb flex aspect-video w-full flex-col items-center justify-center gap-2 text-white" style="--c1:#6d49ff;--c2:#36e0c8">
          <span class="grid h-12 w-12 place-items-center rounded-2xl border border-white/30 bg-white/15"><ge-icon name="image" [size]="22" /></span>
          <span class="text-xs font-semibold text-white/90">Preview unavailable</span>
        </div>
      } @else {
        <img
          [src]="shot.url"
          [alt]="shot.caption"
          class="aspect-video w-full cursor-zoom-in object-cover"
          (click)="openLightbox()"
          (error)="onError(activeIndex())"
          loading="lazy"
        />
      }
      <div
        class="pointer-events-none absolute inset-x-0 bottom-0 bg-gradient-to-t from-ink-950/70 to-transparent p-4"
      >
        <p class="text-sm font-medium text-white">{{ shot.caption }}</p>
      </div>

      @if (screenshots().length > 1) {
        <button
          type="button"
          (click)="prev()"
          class="absolute left-3 top-1/2 grid h-9 w-9 -translate-y-1/2 place-items-center rounded-full bg-white/90 text-slate-700 opacity-0 shadow-soft transition group-hover:opacity-100"
          aria-label="Previous screenshot"
        >
          <ge-icon name="arrow-left" [size]="18" />
        </button>
        <button
          type="button"
          (click)="next()"
          class="absolute right-3 top-1/2 grid h-9 w-9 -translate-y-1/2 place-items-center rounded-full bg-white/90 text-slate-700 opacity-0 shadow-soft transition group-hover:opacity-100"
          aria-label="Next screenshot"
        >
          <ge-icon name="arrow-right" [size]="18" />
        </button>
      }
    </div>

    <!-- Thumbnails -->
    @if (screenshots().length > 1) {
      <div class="flex gap-2 overflow-x-auto pb-1">
        @for (s of screenshots(); track s.id; let i = $index) {
          <button
            type="button"
            (click)="select(i)"
            class="ge-thumb relative h-16 w-28 shrink-0 overflow-hidden rounded-xl border-2 transition"
            style="--c1:#6d49ff;--c2:#36e0c8"
            [class.border-brand-500]="i === activeIndex()"
            [class.border-transparent]="i !== activeIndex()"
            [attr.aria-label]="'View ' + s.caption"
          >
            @if (!hasFailed(i)) {
              <img [src]="s.thumbnail" [alt]="s.caption" class="absolute inset-0 h-full w-full object-cover" loading="lazy" (error)="onError(i)" />
            } @else {
              <span class="absolute inset-0 grid place-items-center text-white/80"><ge-icon name="image" [size]="16" /></span>
            }
          </button>
        }
      </div>
    }
  </div>

  <!-- Lightbox -->
  @if (lightbox()) {
    <div
      class="fixed inset-0 z-50 flex items-center justify-center bg-ink-950/85 p-4 backdrop-blur-sm animate-fade-in"
      (click)="closeLightbox()"
    >
      <button
        type="button"
        class="absolute right-5 top-5 grid h-10 w-10 place-items-center rounded-xl bg-white/10 text-white hover:bg-white/20"
        aria-label="Close"
      >
        <ge-icon name="close" />
      </button>
      <img [src]="shot.url" [alt]="shot.caption" class="max-h-[85vh] max-w-full rounded-2xl shadow-2xl" />
    </div>
  }
}
