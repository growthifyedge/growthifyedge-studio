<!-- Premium gallery header band -->
<section class="vignette noise relative mb-8 overflow-hidden rounded-[32px] border border-white/10 bg-ink-950 p-7 text-white sm:p-9">
  <div class="pointer-events-none absolute inset-0 bg-cinematic opacity-80 animate-glow-breathe"></div>
  <div class="pointer-events-none absolute -left-16 top-0 h-52 w-52 rounded-full bg-brand-600/40 blur-[90px]"></div>
  <div class="pointer-events-none absolute inset-0 bg-grid-faint bg-grid opacity-[0.18]"></div>
  <div class="relative flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <p class="ge-eyebrow !text-brand-300">The full catalog</p>
      <h1 class="mt-2 font-display text-4xl font-bold tracking-tightest sm:text-5xl">
        Software <span class="text-gradient-brand">Gallery</span>
      </h1>
      <p class="mt-3 max-w-xl text-sm text-slate-300 sm:text-base">
        Every product, AI tool and automation we’ve shipped — filter by category, status or technology.
      </p>
    </div>
    <div class="shrink-0">
      <div class="ge-glass-strong inline-flex items-center gap-3 !rounded-2xl px-5 py-3 !text-slate-900">
        <span class="ge-metric-num text-3xl">{{ count() }}</span>
        <span class="text-xs font-semibold leading-tight text-slate-500">live<br />projects</span>
      </div>
    </div>
  </div>
</section>

<div class="space-y-6">
  <ge-filter-bar />

  @if (results().length > 0) {
    <div class="reveal grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
      @for (s of results(); track s.id) {
        <ge-software-card [software]="s" />
      }
    </div>
  } @else {
    <ge-empty-state
      icon="search"
      title="No projects match your filters"
      message="Try clearing the search or switching category, status and technology filters to see more."
    />
  }
</div>
